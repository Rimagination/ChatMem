name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ChatMem ${{ github.ref_name }}
          releaseBody: See the assets to download this version.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: true

      - name: Build portable zip
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          .\scripts\build-portable.ps1 -Version $version

      - name: Upload portable zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist-portable/ChatMem-v*.zip

  release-macos:
    name: release-macos (${{ matrix.target }})
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15-intel
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri macOS bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ChatMem ${{ github.ref_name }}
          releaseBody: See the assets to download this version.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --bundles dmg,app,updater --target ${{ matrix.target }}
